<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cygnus - Hidden Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden; /* Prevents scrollbars */
            background-color: #000;
            color: white;
            font-family: monospace;
        }
        #ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
        }
        h1 {
            margin: 0 0 10px 0;
            color: #d4af37;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
            font-family: sans-serif;
            letter-spacing: 5px;
            font-size: 2rem;
        }
        #fuel-container {
            width: 200px;
            height: 15px;
            border: 2px solid white;
            margin-top: 5px;
        }
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }
    </style>
    <!-- IMPORT MAP: Tells the browser where to find "three" and "three/addons/" -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="ui-container">
        <h1>CYGNUS</h1>
        <div id="velocity-display">VELOCITY: 0.00</div>
        <div id="fuel-container">
            <div id="fuel-bar" style="height: 100%; background: gold; width: 100%;"></div>
        </div>
    </div>
    
    <!-- Use an absolute path so it loads even if you type cygnustheseries.com/game without the slash -->
    <script type="module" src="/game/main.js"></script>
</body>
</html>
